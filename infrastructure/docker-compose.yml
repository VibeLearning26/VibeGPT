# VibeGPT – Local Development Docker Compose
# Usage: docker compose up -d

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vibegpt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibegpt}
      POSTGRES_USER: ${POSTGRES_USER:-vibegpt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibegpt_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibegpt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Ollama LLM ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: vibegpt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: vibegpt-api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vibegpt}:${POSTGRES_PASSWORD:-vibegpt_dev_password}@postgres:5432/${POSTGRES_DB:-vibegpt}
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
  uploads:
    driver: local
