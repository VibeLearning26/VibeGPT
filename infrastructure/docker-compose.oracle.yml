name: vibegpt

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "${OLLAMA_MODEL:-llama3.2:3b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PYTHONPATH: /app
      STORAGE_BACKEND: supabase
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

  worker:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PYTHONPATH: /app
      STORAGE_BACKEND: supabase
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: python -m app.workers.document_worker

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
