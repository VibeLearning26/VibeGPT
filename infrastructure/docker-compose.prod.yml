# VibeGPT – Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ── Caddy Reverse Proxy ────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: vibegpt-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - vibegpt

  # ── Next.js Web App ────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: vibegpt-web
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - vibegpt

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: vibegpt-api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434
      APP_ENV: production
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - vibegpt

  # ── Document Worker ────────────────────────────────────────
  worker:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: vibegpt-worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434
      APP_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: python -m app.workers.document_worker
    networks:
      - vibegpt

  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vibegpt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vibegpt

  # ── Ollama LLM ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: vibegpt-ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - vibegpt

  ollama-init:
    image: ollama/ollama:latest
    container_name: vibegpt-ollama-init
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "${OLLAMA_MODEL:-llama3.2:3b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - vibegpt

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
  uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  vibegpt:
    driver: bridge
